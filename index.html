<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Pacman Runner</title>
    <link rel="icon" type="image/png" href="/pacman-runner-arcade/images/pacman/1.png" />
    <script type="module" crossorigin src="/pacman-runner-arcade/assets/index-ByPTB5iD.js"></script>
    <link rel="stylesheet" crossorigin href="/pacman-runner-arcade/assets/index-xPqt5PAm.css">
  </head>
  <body>
    <!-- game over screen -->
    <div id="game-over-overlay">
      <div class="game-over-card">
        <h1>Game Over</h1>
        <p class="final-score-text">
          Score: <span id="final-score-val">0000</span>
        </p>
        <div
          class="highscore-badge"
          id="new-highscore-badge"
          style="display: none"
        >
          NEW HIGHSCORE!
        </div>
        <button class="retry-btn" id="btn-retry">
          <svg viewBox="0 0 24 24">
            <path
              d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"
            />
          </svg>
          <span>Retry</span>
        </button>

        <div class="credits-container">
          <p class="made-by-text">Made by Vince van Apeldoorn</p>
        </div>
      </div>
    </div>

  </body>
</html>
